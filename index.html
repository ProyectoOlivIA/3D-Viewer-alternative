<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Axion Shuttle Gesture Control</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #000;
    font-family: Arial, Helvetica, sans-serif;
}

/* El lienzo 3D se superpone a pantalla completa */
#canvas-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 2;
    pointer-events: none; /* Permite que los eventos fluyan correctamente */
}

/* La cámara pasa a ocupar todo el fondo de pantalla */
.input_video {
    position: absolute;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    transform: scaleX(-1); /* Efecto espejo para el usuario */
    z-index: 1;
}

.ui {
    position: absolute;
    top: 20px;
    left: 20px;
    color: white;
    background: rgba(0,0,0,0.75);
    padding: 16px;
    border-radius: 12px;
    z-index: 10;
    backdrop-filter: blur(4px);
    border: 1px solid rgba(255, 255, 255, 0.1);
}

#status { color: #00ff88; font-weight: bold; }
#gesture { opacity: 0.85; font-family: monospace; }
</style>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

</head>

<body>

<div class="ui">
    <h2>Axion Shuttle</h2>
    <div id="status">iniciando...</div>
    <div id="gesture">esperando mano...</div>
</div>

<video class="input_video" autoplay playsinline></video>
<div id="canvas-container"></div>

<script type="module" src="main.js"></script>

</body>
</html>
